name: Build & Deploy FastAPI

on:
  push:
    branches: [master]

env:
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # Job 1: Build Docker image and push to GitHub Container Registry
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  # Job 2: Run Terraform to provision/update EC2
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build        # only runs after Docker image is built
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_github_username: ${{ github.actor }}

# Job 3: SSH into EC2 and restart the app with latest Docker image
  redeploy:
    name: Redeploy on EC2
    runs-on: ubuntu-latest
    needs: build       # runs after Docker image is pushed

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Kill whatever is using port 8000
            sudo fuser -k 8000/tcp || true

            # Stop and remove old container if exists
            docker stop fastapi-app || true
            docker rm fastapi-app || true

            # Pull latest image and run
            docker pull ghcr.io/${{ github.repository }}:latest
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest