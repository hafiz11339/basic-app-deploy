name: Build & Deploy FastAPI

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # Job 1: Always build & push new Docker image first
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  # Job 2: Only run Terraform when infra files change
  # If only app code changed, this job is skipped entirely
  deploy:
    name: Terraform Deploy (infra changes only)
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: terraform

    # ✅ Only runs when terraform files are changed
    if: |
      contains(join(github.event.commits.*.modified, ','), 'terraform/') ||
      contains(join(github.event.commits.*.added, ','), 'terraform/')

    outputs:
      ec2_host: ${{ steps.tf_output.outputs.ec2_host }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Capture EC2 IP
        id: tf_output
        run: |
          EC2_IP=$(terraform output -raw app_url | sed 's|http://||' | sed 's|:8000||')
          echo "ec2_host=$EC2_IP" >> $GITHUB_OUTPUT

      - name: Show App URLs
        run: |
          echo "✅ App URL:  $(terraform output -raw app_url)"
          echo "📄 Docs URL: $(terraform output -raw docs_url)"

      # After fresh EC2 is created, wait for it to boot then redeploy
      - name: Wait for EC2 to boot
        run: sleep 30

      - name: Deploy to fresh EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.tf_output.outputs.ec2_host }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo fuser -k 8000/tcp || true
            docker stop fastapi-app || true
            docker rm   fastapi-app || true
            docker pull ghcr.io/${{ github.repository }}:latest
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest
            docker ps | grep fastapi-app

  # Job 3: For normal code pushes — just SSH and restart container
  # This runs when terraform files did NOT change (normal code push)
  redeploy:
    name: Redeploy on Existing EC2
    runs-on: ubuntu-latest
    needs: build

    # ✅ Runs when terraform files are NOT changed (just app code changed)
    if: |
      !contains(join(github.event.commits.*.modified, ','), 'terraform/') &&
      !contains(join(github.event.commits.*.added, ','), 'terraform/')

    steps:
      - name: Deploy latest image to existing EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}      # static IP stored in secret
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop fastapi-app || true
            docker rm   fastapi-app || true
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest
            docker ps | grep fastapi-app
            echo "✅ Deployed successfully"