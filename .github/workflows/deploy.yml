name: Build & Deploy FastAPI

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # Job 1: Always build & push new Docker image FIRST
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  # Job 2: Detect whether terraform/ files changed in this push
  check-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.detect.outputs.terraform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for terraform changes
        id: detect
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^terraform/'; then
            echo "terraform=true" >> $GITHUB_OUTPUT
          else
            echo "terraform=false" >> $GITHUB_OUTPUT
          fi

  # Job 3: Terraform — only when terraform/ files change
  # Creates new EC2, captures its IP, updates GitHub secret, then deploys
  deploy:
    name: Terraform Deploy (infra changes only)
    runs-on: ubuntu-latest
    needs: [build, check-changes]
    permissions:
      contents: write   # needed to update GitHub secret
    defaults:
      run:
        working-directory: terraform

    if: needs.check-changes.outputs.terraform == 'true'

    outputs:
      ec2_host: ${{ steps.tf_output.outputs.ec2_host }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      # Capture the new EC2 IP from terraform output
      - name: Capture EC2 IP
        id: tf_output
        run: |
          EC2_IP=$(terraform output -raw app_url | sed 's|http://||' | sed 's|:8000||')
          echo "ec2_host=$EC2_IP" >> $GITHUB_OUTPUT
          echo "New EC2 IP: $EC2_IP"

      # Automatically update the EC2_HOST secret with the new IP
      # Requires GH_PAT secret (PAT with repo scope) — GITHUB_TOKEN can't manage secrets
      - name: Update EC2_HOST secret with new IP
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set EC2_HOST --body "${{ steps.tf_output.outputs.ec2_host }}" --repo ${{ github.repository }}

      - name: Show App URLs
        run: |
          echo "App URL:  $(terraform output -raw app_url)"
          echo "Docs URL: $(terraform output -raw docs_url)"

      # Wait for EC2 to fully boot and Docker to finish installing (apt-get takes 2-4 min)
      - name: Wait for EC2 to boot
        run: |
          echo "Waiting 180 seconds for EC2 to boot and Docker to install..."
          sleep 180

      # Deploy to the brand new EC2 using the fresh IP
      - name: Deploy to fresh EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.tf_output.outputs.ec2_host }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            docker pull ghcr.io/${{ github.repository }}:latest
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest
            docker ps | grep fastapi-app
            echo "Deployed to fresh EC2 successfully"

  # Job 4: Normal code push — SSH into existing EC2 and redeploy
  # EC2_HOST secret is always up to date thanks to Job 3 above
  redeploy:
    name: Redeploy on Existing EC2
    runs-on: ubuntu-latest
    needs: [build, check-changes]

    if: needs.check-changes.outputs.terraform == 'false'

    steps:
      - name: Deploy latest image to existing EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Force pull latest image (never use cache)
            docker pull ghcr.io/${{ github.repository }}:latest

            # Stop and remove old container
            docker stop fastapi-app || true
            docker rm fastapi-app || true

            # Start fresh container with latest image
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest

            docker ps | grep fastapi-app
            echo "Deployed latest code successfully"
