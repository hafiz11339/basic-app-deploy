name: Build & Deploy FastAPI

on:
  push:
    branches: [master]

env:
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # Job 1: Build Docker image and push to GitHub Container Registry
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  # Job 2: Run Terraform to provision/update EC2
  # Outputs the fresh EC2 IP so the redeploy job can SSH into the right host
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: terraform

    outputs:
      ec2_host: ${{ steps.tf_output.outputs.ec2_host }}   # 👈 pass IP to next job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false   # needed so raw output works below

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Capture EC2 IP from Terraform output
        id: tf_output
        run: |
          EC2_IP=$(terraform output -raw ec2_public_ip)
          echo "ec2_host=$EC2_IP" >> $GITHUB_OUTPUT

      - name: Show App URLs
        run: |
          echo "✅ App URL:  $(terraform output -raw app_url)"
          echo "📄 Docs URL: $(terraform output -raw docs_url)"

  # Job 3: SSH into the NEWLY created EC2 and start the app
  # Runs after deploy so we always have the correct fresh IP
  redeploy:
    name: Redeploy on EC2
    runs-on: ubuntu-latest
    needs: deploy   # 👈 changed from `build` — wait for Terraform to finish first

    steps:
      - name: Wait for EC2 SSH to become available
        run: |
          echo "Giving the new instance ~20s to finish booting..."
          sleep 20

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.deploy.outputs.ec2_host }}   # 👈 fresh IP from Terraform
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Kill whatever is using port 8000
            sudo fuser -k 8000/tcp || true

            # Stop and remove old container if exists
            docker stop fastapi-app || true
            docker rm   fastapi-app || true

            # Pull the latest image (has your new /flow-check route)
            docker pull ghcr.io/${{ github.repository }}:latest

            # Run with --pull always so Docker never uses a cached layer
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              --pull always \
              ghcr.io/${{ github.repository }}:latest

            # Confirm the container is actually running
            docker ps | grep fastapi-app