name: Build & Deploy FastAPI

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # Job 1: Always build & push new Docker image FIRST
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  # Job 2: Detect whether terraform/ files changed in this push
  check-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.detect.outputs.terraform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for terraform changes
        id: detect
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^terraform/'; then
            echo "terraform=true" >> $GITHUB_OUTPUT
          else
            echo "terraform=false" >> $GITHUB_OUTPUT
          fi

  # Job 3: Terraform — only when terraform/ files change
  # Creates new EC2, captures its IP, then deploys
  deploy:
    name: Terraform Deploy (infra changes only)
    runs-on: ubuntu-latest
    needs: [build, check-changes]
    defaults:
      run:
        working-directory: terraform

    if: needs.check-changes.outputs.terraform == 'true'

    outputs:
      ec2_host: ${{ steps.tf_output.outputs.ec2_host }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          TF_VAR_deploy_public_key: ${{ secrets.DEPLOY_PUBLIC_KEY }}
        run: terraform apply -auto-approve

      - name: Capture EC2 IP
        id: tf_output
        run: |
          EC2_IP=$(terraform output -raw app_url | sed 's|http://||' | sed 's|:8000||')
          echo "ec2_host=$EC2_IP" >> $GITHUB_OUTPUT
          echo "New EC2 IP: $EC2_IP"

      - name: Show App URLs
        run: |
          echo "App URL:  $(terraform output -raw app_url)"
          echo "Docs URL: $(terraform output -raw docs_url)"

      # Wait for EC2 to fully boot and Docker to finish installing (apt-get takes 2-4 min)
      - name: Wait for EC2 to boot
        run: |
          echo "Waiting 180 seconds for EC2 to boot and Docker to install..."
          sleep 180

      - name: Deploy to fresh EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.tf_output.outputs.ec2_host }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            docker pull ghcr.io/${{ github.repository }}:latest
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest
            docker ps | grep fastapi-app
            echo "Deployed to fresh EC2 successfully"

  # Job 4: Normal code push — look up the running EC2 by tag and redeploy
  # No stored EC2_HOST secret needed — AWS CLI finds the instance dynamically
  redeploy:
    name: Redeploy on Existing EC2
    runs-on: ubuntu-latest
    needs: [build, check-changes]

    if: needs.check-changes.outputs.terraform == 'false'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get EC2 public IP from AWS
        id: ec2_ip
        run: |
          # Find instance by tag regardless of state
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=fastapi-app" \
              "Name=instance-state-name,Values=running,stopped" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No EC2 instance found with tag Name=fastapi-app"
            exit 1
          fi

          # Start the instance if it is stopped
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)
          if [ "$STATE" = "stopped" ]; then
            echo "Instance $INSTANCE_ID is stopped — starting it..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            echo "Instance is now running."
          fi

          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT
          echo "Deploying to EC2: $EC2_IP"

      - name: Deploy latest image to existing EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.ec2_ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest
            docker ps | grep fastapi-app
            echo "Deployed latest code successfully"
